<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess The Image</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 40px; }
        
        .canvas-container {
            width: 400px;
            height: 400px;
            border: 2px solid #333;
            margin: 20px auto;
            background-color: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        canvas { 
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;       
        }
        
        .control-group { margin: 20px auto; max-width: 400px; text-align: left; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input[type="number"], input[type="text"] { width: 100%; padding: 10px; box-sizing: border-box; font-size: 16px; margin-top: 5px; }
        
        .autocomplete-container { position: relative; width: 100%; }
        .autocomplete-list { 
            position: absolute; border: 1px solid #ccc; border-top: none; 
            z-index: 99; top: 100%; left: 0; right: 0; 
            max-height: 150px; overflow-y: auto; background: white; text-align: left;
        }
        .autocomplete-item { padding: 10px; cursor: pointer; }
        .autocomplete-item:hover { background-color: #e9e9e9; }
        
        .correct { background-color: green; color: white; padding: 10px; margin-top: 20px; }
        .wrong { background-color: red; color: white; padding: 10px; margin-top: 20px; }
        
        /* Action Button Styling */
        .btn-update { 
            margin-top: 20px; width: 100%; padding: 12px; 
            font-size: 16px; background-color: #007BFF; color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .btn-update:hover { background-color: #0056b3; }
        .btn-update:disabled { background-color: #cccccc; cursor: not-allowed; }

        .btn-grayscale {
            margin-top: 10px; width: 100%; padding: 12px;
            font-size: 16px; background-color: #6c757d; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .btn-grayscale.active { background-color: #343a40; }
    </style>
</head>
<body>
    <h1>Guess The Image</h1>
    <p>Look at the compressed image and guess what fruit it is!</p>
    
    <div class="canvas-container">
        <canvas id="imageCanvas"></canvas>
    </div>

    <div class="control-group">
        <label for="n_input">Adjust compression level (singular values):</label>
        <!-- Default value altered directly to 1 here -->
        <input type="number" id="n_input" value="1" min="1">
        
        <label for="guess_input" style="margin-top: 20px;">Choose the correct fruit:</label>
        <div class="autocomplete-container">
            <input type="text" id="guess_input" placeholder="Start typing a fruit name..." autocomplete="off">
            <div id="autocomplete_list" class="autocomplete-list"></div>
        </div>

        <!-- Added Grayscale modification switch toggle element -->
        <button id="gray_btn" class="btn-grayscale">Toggle Grayscale: OFF</button>
        <button id="update_btn" class="btn-update">Update Image (Next Round)</button>
    </div>

    <div id="result"></div>

    <script>
        let svdData = {{ svd_matrices_json | safe }};
        let imgHeight = parseInt("{{ img_height }}") || 400;
        let imgWidth = parseInt("{{ img_width }}") || 400;
        let correct = "{{ correct }}";
        let isGrayscale = false; // State variable tracking active filter parameters
        
        const allNames = {{ names_list_json | safe }}.sort((a, b) => a.localeCompare(b));

        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const nInput = document.getElementById('n_input');
        const guessInput = document.getElementById('guess_input');
        const autocompleteList = document.getElementById('autocomplete_list');
        const resultDiv = document.getElementById('result');
        const updateBtn = document.getElementById('update_btn');
        const grayBtn = document.getElementById('gray_btn');

        function setupCanvasDimensions() {
            canvas.width = imgWidth;
            canvas.height = imgHeight;
            nInput.max = Math.min(imgHeight, imgWidth);
        }

        function reconstructChannel(channelSVD, n) {
            const U = channelSVD.U; const s = channelSVD.s; const V = channelSVD.V;
            const out = new Float32Array(imgHeight * imgWidth);
            
            for (let r = 0; r < imgHeight; r++) {
                for (let c = 0; c < imgWidth; c++) {
                    let val = 0;
                    for (let i = 0; i < n; i++) { 
                        val += U[r][i] * s[i] * V[i][c]; 
                    }
                    out[r * imgWidth + c] = val;
                }
            }
            return out;
        }

        function drawCompressedImage() {
            if (!svdData || svdData.length < 3) return;
            
            let n = parseInt(nInput.value) || 1;
            if (n < 1) n = 1;
            if (n > nInput.max) n = nInput.max;

            const rData = reconstructChannel(svdData, n);
            const gData = reconstructChannel(svdData, n);
            const bData = reconstructChannel(svdData, n);

            const imgData = ctx.createImageData(imgWidth, imgHeight);
            const data = imgData.data;

            let maxR = 0, minR = Infinity, maxG = 0, minG = Infinity, maxB = 0, minB = Infinity;
            for (let i = 0; i < rData.length; i++) {
                if (rData[i] > maxR) maxR = rData[i]; if (rData[i] < minR) minR = rData[i];
                if (gData[i] > maxG) maxG = gData[i]; if (gData[i] < minG) minG = gData[i];
                if (bData[i] > maxB) maxB = bData[i]; if (bData[i] < minB) minB = bData[i];
            }

            for (let i = 0; i < rData.length; i++) {
                const idx = i * 4;
                
                let r = Math.min(255, Math.max(0, ((rData[i] - minR) / (maxR - minR || 1)) * 255));
                let g = Math.min(255, Math.max(0, ((gData[i] - minG) / (maxG - minG || 1)) * 255));
                let b = Math.min(255, Math.max(0, ((bData[i] - minB) / (maxB - minB || 1)) * 255));

                // Apply weighted luminance formula if grayscale is enabled
                if (isGrayscale) {
                    const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                    r = gray;
                    g = gray;
                    b = gray;
                }

                data[idx]     = r;
                data[idx + 1] = g;
                data[idx + 2] = b;
                data[idx + 3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function evaluateGuess(selected) {
            guessInput.value = selected;
            autocompleteList.innerHTML = "";
            guessInput.disabled = true;
            nInput.disabled = true;

            if (selected.toLowerCase() === correct.toLowerCase()) {
                resultDiv.innerHTML = '<p class="correct">Correct! It was ' + correct + '.</p>';
            } else {
                resultDiv.innerHTML = '<p class="wrong">Wrong! It was ' + correct + '.</p>';
            }
        }

        async function loadNextImage() {
            try {
                updateBtn.disabled = true;
                updateBtn.innerText = "Loading data stream...";
                
                const response = await fetch('/api/new-game');
                if (!response.ok) throw new Error("Server network fault.");
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                svdData = data.svd_matrices;
                imgHeight = data.img_height;
                imgWidth = data.img_width;
                correct = data.correct;

                guessInput.disabled = false;
                nInput.disabled = false;
                guessInput.value = "";
                resultDiv.innerHTML = "";
                nInput.value = "1"; // Resets default field values to 1 on update cycles
                
                setupCanvasDimensions();
                drawCompressedImage();
            } catch (error) {
                console.error("Network Fetch error trace:", error);
                alert("Failed to grab a new image.\n\nServer Trace details:\n" + error.message);
            } finally {
                updateBtn.disabled = false;
                updateBtn.innerText = "Update Image (Next Round)";
            }
        }

        // Grayscale switch action handler logic
        grayBtn.addEventListener('click', function() {
            isGrayscale = !isGrayscale;
            if (isGrayscale) {
                grayBtn.innerText = "Toggle Grayscale: ON";
                grayBtn.classList.add('active');
            } else {
                grayBtn.innerText = "Toggle Grayscale: OFF";
                grayBtn.classList.remove('active');
            }
            drawCompressedImage(); // Re-render image matrix with new values instantly
        });

        guessInput.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            autocompleteList.innerHTML = "";
            if (!val) return;

            const matches = allNames.filter(name => name.toLowerCase().startsWith(val));
            matches.forEach(match => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                item.innerHTML = `<strong>${match.substr(0, val.length)}</strong>${match.substr(val.length)}`;
                item.addEventListener('click', () => evaluateGuess(match));
                autocompleteList.appendChild(item);
            });
        });

        document.addEventListener('click', (e) => {
            if (e.target !== guessInput) autocompleteList.innerHTML = "";
        });

        nInput.addEventListener('input', drawCompressedImage);
        updateBtn.addEventListener('click', loadNextImage);
        
        setupCanvasDimensions();
        drawCompressedImage();
    </script>
</body>
</html>
